<main
  data-testid="main-app-layout"
  class="h-screen grid grid-cols-[260px_minmax(320px,1fr)_2fr] bg-fest-bg text-fest-text font-body overflow-hidden"
>
  <app-sidebar class="h-full"></app-sidebar>

  <ng-container *ngIf="currentView() === 'map'; else adminView">
    <app-festival-sidebar class="h-full overflow-y-auto"></app-festival-sidebar>
    <app-festival-map class="h-full"></app-festival-map>
  </ng-container>

  <ng-template #adminView>
    <div class="col-span-2 overflow-auto">
      <app-admin-page></app-admin-page>
    </div>
  </ng-template>

  <p-toast />
  <app-auth-modal></app-auth-modal>
</main>
