<div class="p-6 bg-fest-bg min-h-screen">
  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-heading text-fest-orange">Administration - Festivals</h1>
      <p-button
        label="Ajouter un festival"
        icon="pi pi-plus"
        styleClass="p-button-fest-magenta"
        (onClick)="showDialog()"
      ></p-button>
    </header>

    <div class="bg-fest-surface rounded-xl border border-white/5 overflow-hidden shadow-xl">
      <p-table [value]="(festivals$ | async) || []" [responsiveLayout]="'scroll'">
        <ng-template pTemplate="header">
          <tr>
            <th class="bg-fest-surface text-fest-text/60 font-medium">Nom</th>
            <th class="bg-fest-surface text-fest-text/60 font-medium">Genre</th>
            <th class="bg-fest-surface text-fest-text/60 font-medium">Lieu</th>
            <th class="bg-fest-surface text-fest-text/60 font-medium">Dates</th>
            <th class="bg-fest-surface text-fest-text/60 font-medium w-32">Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-festival>
          <tr
            (click)="showDialog(festival, true)"
            class="border-t border-white/5 hover:bg-white/5 transition-colors cursor-pointer"
          >
            <td class="text-fest-text font-medium">{{ festival.name }}</td>
            <td class="text-fest-text/80">{{ festival.genre }}</td>
            <td class="text-fest-text/80">
              {{ festival.address.city }}, {{ festival.address.country }}
            </td>
            <td class="text-fest-text/80 text-sm">
              {{ festival.startDate | date: 'dd/MM/yyyy' }} -
              {{ festival.endDate | date: 'dd/MM/yyyy' }}
            </td>
            <td>
              <div class="flex gap-2">
                <button
                  (click)="showDialog(festival, false); $event.stopPropagation()"
                  class="p-2 text-blue-400 hover:bg-blue-400/10 rounded-lg transition-colors"
                  title="Modifier"
                >
                  <i class="pi pi-pencil"></i>
                </button>
                <button
                  (click)="deleteFestival($event, festival.id)"
                  class="p-2 text-red-400 hover:bg-red-400/10 rounded-lg transition-colors"
                  title="Supprimer"
                >
                  <i class="pi pi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="p-8 text-center text-fest-text/40">Aucun festival trouvé.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

<!-- Modal de création/édition/consultation -->
<p-dialog
  [(visible)]="displayDialog"
  [header]="
    isReadOnly
      ? 'Détails du festival'
      : selectedFestival
        ? 'Modifier le festival'
        : 'Nouveau festival'
  "
  [modal]="true"
  [style]="{ width: '50vw' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="festmap-dialog"
  (onHide)="hideDialog()"
>
  <app-festival-form
    [festival]="selectedFestival"
    [readOnly]="isReadOnly"
    (save)="saveFestival($event)"
    (cancel)="hideDialog()"
  ></app-festival-form>
</p-dialog>

<p-toast></p-toast>
