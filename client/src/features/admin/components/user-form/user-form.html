<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 p-1">
  <section class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label for="email" class="text-fest-text/60 text-sm">Email</label>
      <input
        pInputText
        id="email"
        formControlName="email"
        placeholder="Ex: admin@festmap.com"
        class="w-full bg-fest-bg border-white/10 text-fest-text"
      />
      <small
        *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched"
        class="text-red-400"
      >
        L'email est invalide.
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label for="password" class="text-fest-text/60 text-sm">
        Mot de passe {{ user ? '(laisser vide pour ne pas modifier)' : '' }}
      </label>
      <p-password
        id="password"
        formControlName="password"
        [toggleMask]="true"
        [feedback]="!user"
        [fluid]="true"
        placeholder="******"
        inputStyleClass="w-full bg-fest-bg border-white/10 text-fest-text"
      ></p-password>
      <small
        *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched"
        class="text-red-400"
      >
        Le mot de passe doit faire au moins 6 caractères.
      </small>
    </div>

    <div class="flex flex-col gap-2">
      <label for="role" class="text-fest-text/60 text-sm">Rôle</label>
      <p-select
        id="role"
        formControlName="role"
        [options]="roles"
        optionLabel="label"
        optionValue="value"
        [fluid]="true"
        styleClass="w-full bg-fest-bg border-white/10 text-fest-text"
      ></p-select>
    </div>
  </section>

  <!-- Actions -->
  <footer class="flex justify-end gap-3 mt-4 pt-4 border-t border-white/5">
    <ng-container *ngIf="!readOnly; else readOnlyActions">
      <p-button
        label="Annuler"
        icon="pi pi-times"
        [text]="true"
        styleClass="p-button-secondary"
        (onClick)="onCancel()"
        type="button"
      ></p-button>
      <p-button
        [label]="user ? 'Mettre à jour' : 'Créer l\'utilisateur'"
        icon="pi pi-check"
        styleClass="p-button-fest-magenta"
        type="submit"
        [disabled]="userForm.invalid"
      ></p-button>
    </ng-container>
    <ng-template #readOnlyActions>
      <p-button
        label="Fermer"
        icon="pi pi-times"
        styleClass="p-button-secondary"
        (onClick)="onCancel()"
        type="button"
      ></p-button>
    </ng-template>
  </footer>
</form>
