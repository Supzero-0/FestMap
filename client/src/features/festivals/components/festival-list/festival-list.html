<aside class="list" data-testid="festival-list">
  <div class="flex flex-col h-full">
    <h2 class="text-fest-orange sticky top-0 z-10 bg-fest-surface px-4 pb-4">
      Liste des festivals
    </h2>

    <div class="flex-1 overflow-y-auto">
      <!-- Error -->
      <p *ngIf="error; else ok" role="alert" aria-live="polite">
        {{ error }}
      </p>

      <!-- Ok -->
      <ng-template #ok>
        <!-- Loading -->
        <p *ngIf="loading; else dataTpl" class="loading" aria-busy="true">Chargement...</p>

        <!-- Data -->
        <ng-template #dataTpl>
          <ul
            *ngIf="festivals.length; else empty"
            aria-busy="false"
            class="grid gap-4 rounded-lg bg-fest-bg p-4"
          >
            <li *ngFor="let f of festivals; trackBy: trackById" class="w-full">
              <app-festival-card
                [festival]="f"
                [isSelected]="f.id === selectedFestivalId"
                (selectFestival)="onSelect(f.id)"
                (deleteFestival)="onDelete($event)"
                (toggleFavorite)="onToggleFavorite(f.id)"
              ></app-festival-card>
            </li>
          </ul>
        </ng-template>
      </ng-template>

      <ng-template #empty>
        <p data-testid="festival-list-empty">Aucun festival</p>
      </ng-template>
    </div>
  </div>
</aside>
