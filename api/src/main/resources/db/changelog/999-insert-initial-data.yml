              - column: { name: address_line, value: "Site de Kerampuil" }
              - column: { name: postal_code, value: "29270" }
              - column: { name: city, value: "Carhaix-Plouguer" }
              - column: { name: country, value: "France" }
        - insert:
            tableName: festival
