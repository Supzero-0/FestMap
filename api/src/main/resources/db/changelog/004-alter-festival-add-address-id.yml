databaseChangeLog:
  - changeSet:
      id: 004-alter-festival-add-address-id
      author: supzero
      changes:
        - addColumn:
            tableName: festival
            columns:
              - column:
                  name: address_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
        - addForeignKeyConstraint:
            baseTableName: festival
            baseColumnNames: address_id
            referencedTableName: address
            referencedColumnNames: id
            constraintName: fk_festival_address